          type: [string, 'null']
        vatNo:
          type: [string, 'null']
        address:
          type: [string, 'null']
        billingEmail:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        baseCurrency:
          type: string
        invoiceTermsDays:
          type: integer
        nextInvoiceSeq:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: [string, 'null']
          format: date-time

    OrgUpdate:
      type: object
      properties:
