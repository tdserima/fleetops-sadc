openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FleetOps SADC API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: Org
    description: Organisation and membership
  - name: Trucks
    description: Fleet truck management
  - name: Drivers
    description: Driver management
  - name: Loads
    description: Load / consignment management
  - name: Trips
    description: Trip and cost management
  - name: Disbursements
    description: Trip disbursements
  - name: Compliance
    description: Compliance document vault
  - name: Fuel
    description: Fuel purchases
  - name: FxRates
    description: FX rate management
  - name: BorderCatalog
    description: Border charge catalog
  - name: Storage
    description: File upload and object storage
  - name: Dashboard
    description: KPI and dashboard aggregates
  - name: Demo
    description: Demo seed and reset

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ───────────────────────────────────────────────────────────────
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect after login.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to OIDC logout.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  # ─── Org ────────────────────────────────────────────────────────────────
  /org:
    get:
      tags: [Org]
      operationId: getOrg
      summary: Get the current org
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
    patch:
      tags: [Org]
      operationId: updateOrg
      summary: Update org settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrgUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'

  /org/members:
    get:
      tags: [Org]
      operationId: listOrgMembers
      summary: List org members
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrgMember'
    post:
      tags: [Org]
      operationId: inviteOrgMember
      summary: Invite a new org member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrgMemberInvite'
      responses:
        '201':
          description: Invited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgMember'

  /org/members/{memberId}:
    patch:
      tags: [Org]
      operationId: updateOrgMember
      summary: Update a member's role
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrgMemberUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgMember'
    delete:
      tags: [Org]
      operationId: removeOrgMember
      summary: Remove a member from the org
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Removed

  # ─── FX Rates ────────────────────────────────────────────────────────────
  /fx-rates:
    get:
      tags: [FxRates]
      operationId: listFxRates
      summary: List all FX rates for the org
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FxRate'
    post:
      tags: [FxRates]
      operationId: upsertFxRate
      summary: Create or update an FX rate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FxRateInput'
      responses:
        '200':
          description: Upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FxRate'

  # ─── Trucks ──────────────────────────────────────────────────────────────
  /trucks:
    get:
      tags: [Trucks]
      operationId: listTrucks
      summary: List all trucks in the org fleet
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Truck'
    post:
      tags: [Trucks]
      operationId: createTruck
      summary: Add a truck to the fleet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TruckInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Truck'

  /trucks/{truckId}:
    get:
      tags: [Trucks]
      operationId: getTruck
      summary: Get a single truck
      parameters:
        - name: truckId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Truck'
    patch:
      tags: [Trucks]
      operationId: updateTruck
      summary: Update truck details
      parameters:
        - name: truckId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TruckUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Truck'
    delete:
      tags: [Trucks]
      operationId: deleteTruck
      summary: Remove a truck
      parameters:
        - name: truckId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted

  /trucks/{truckId}/border-ready:
    get:
      tags: [Trucks]
      operationId: getTruckBorderReady
      summary: Get border-ready status for a truck
      parameters:
        - name: truckId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TruckBorderReadyStatus'

  # ─── Drivers ──────────────────────────────────────────────────────────────
  /drivers:
    get:
      tags: [Drivers]
      operationId: listDrivers
      summary: List all drivers in the org
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Driver'
    post:
      tags: [Drivers]
      operationId: createDriver
      summary: Add a driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'

  /drivers/{driverId}:
    get:
      tags: [Drivers]
      operationId: getDriver
      summary: Get a single driver
      parameters:
        - name: driverId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
    patch:
      tags: [Drivers]
      operationId: updateDriver
      summary: Update driver details
      parameters:
        - name: driverId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
    delete:
      tags: [Drivers]
      operationId: deleteDriver
      summary: Remove a driver
      parameters:
        - name: driverId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted

  # ─── Loads ────────────────────────────────────────────────────────────────
  /loads:
    get:
      tags: [Loads]
      operationId: listLoads
      summary: List loads for the org
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: truckId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Load'
    post:
      tags: [Loads]
      operationId: createLoad
      summary: Create a new load
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoadInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Load'

  /loads/{loadId}:
    get:
      tags: [Loads]
      operationId: getLoad
      summary: Get a single load
      parameters:
        - name: loadId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Load'
    patch:
      tags: [Loads]
      operationId: updateLoad
      summary: Update load details or status
      parameters:
        - name: loadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoadUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Load'
    delete:
      tags: [Loads]
      operationId: deleteLoad
      summary: Delete a load
      parameters:
        - name: loadId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted

  /loads/{loadId}/assign:
    post:
      tags: [Loads]
      operationId: assignLoad
      summary: Assign a load to a truck
      parameters:
        - name: loadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoadAssignment'
      responses:
        '200':
          description: Assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Load'

  /loads/{loadId}/deliver:
    post:
      tags: [Loads]
      operationId: deliverLoad
      summary: Mark load as delivered and set ePOD URL
      parameters:
        - name: loadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoadDelivery'
      responses:
        '200':
          description: Delivered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Load'

  /loads/{loadId}/invoice:
    post:
      tags: [Loads]
      operationId: generateInvoice
      summary: Generate invoice PDF for a delivered load
      parameters:
        - name: loadId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Load'

  /loads/{loadId}/mark-paid:
    post:
      tags: [Loads]
      operationId: markInvoicePaid
      summary: Mark invoice as paid
      parameters:
        - name: loadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoicePaidUpdate'
      responses:
        '200':
          description: Marked paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Load'

  # ─── Trips ────────────────────────────────────────────────────────────────
  /trips:
    get:
      tags: [Trips]
      operationId: listTrips
      summary: List trips for the org
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: truckId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trip'
    post:
      tags: [Trips]
      operationId: createTrip
      summary: Create a new trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'

  /trips/{tripId}:
    get:
      tags: [Trips]
      operationId: getTrip
      summary: Get a single trip with stops and disbursements
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripDetail'
    patch:
      tags: [Trips]
      operationId: updateTrip
      summary: Update trip details
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
    delete:
      tags: [Trips]
      operationId: deleteTrip
      summary: Delete a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted

  /trips/{tripId}/cost-sheet:
    get:
      tags: [Trips]
      operationId: getTripCostSheet
      summary: Get trip P&L / cost sheet (with PDF generation)
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripCostSheet'

  /trips/{tripId}/stops:
    get:
      tags: [Trips]
      operationId: listTripStops
      summary: List stops for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TripStop'
    post:
      tags: [Trips]
      operationId: addTripStop
      summary: Add a stop to a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripStopInput'
      responses:
        '201':
          description: Added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripStop'

  /trips/{tripId}/stops/{stopId}:
    delete:
      tags: [Trips]
      operationId: deleteTripStop
      summary: Remove a stop from a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
        - name: stopId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted

  # ─── Disbursements ────────────────────────────────────────────────────────
  /trips/{tripId}/disbursements:
    get:
      tags: [Disbursements]
      operationId: listDisbursements
      summary: List disbursements for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Disbursement'
    post:
      tags: [Disbursements]
      operationId: createDisbursement
      summary: Log a disbursement on a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisbursementInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Disbursement'

  /trips/{tripId}/disbursements/{disbursementId}:
    patch:
      tags: [Disbursements]
      operationId: updateDisbursement
      summary: Update a disbursement
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
        - name: disbursementId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisbursementUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Disbursement'
    delete:
      tags: [Disbursements]
      operationId: deleteDisbursement
      summary: Delete a disbursement
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
        - name: disbursementId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted

  # ─── Compliance Documents ─────────────────────────────────────────────────
  /compliance-docs:
    get:
      tags: [Compliance]
      operationId: listComplianceDocs
      summary: List compliance documents for the org
      parameters:
        - name: entityType
          in: query
          required: false
          schema:
            type: string
        - name: entityId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComplianceDoc'
    post:
      tags: [Compliance]
      operationId: createComplianceDoc
      summary: Add a compliance document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplianceDocInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceDoc'

  /compliance-docs/{docId}:
    get:
      tags: [Compliance]
      operationId: getComplianceDoc
      summary: Get a single compliance document
      parameters:
        - name: docId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceDoc'
    patch:
      tags: [Compliance]
      operationId: updateComplianceDoc
      summary: Update a compliance document
      parameters:
        - name: docId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplianceDocUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceDoc'
    delete:
      tags: [Compliance]
      operationId: deleteComplianceDoc
      summary: Delete a compliance document
      parameters:
        - name: docId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted

  # ─── Fuel Purchases ────────────────────────────────────────────────────────
  /fuel-purchases:
    get:
      tags: [Fuel]
      operationId: listFuelPurchases
      summary: List fuel purchases for the org
      parameters:
        - name: truckId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FuelPurchase'
    post:
      tags: [Fuel]
      operationId: createFuelPurchase
      summary: Log a fuel purchase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FuelPurchaseInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FuelPurchase'

  /fuel-purchases/{purchaseId}:
    patch:
      tags: [Fuel]
      operationId: updateFuelPurchase
      summary: Update a fuel purchase
      parameters:
        - name: purchaseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FuelPurchaseUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FuelPurchase'
    delete:
      tags: [Fuel]
      operationId: deleteFuelPurchase
      summary: Delete a fuel purchase
      parameters:
        - name: purchaseId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted

  # ─── Border Charge Catalog ────────────────────────────────────────────────
  /border-catalog:
    get:
      tags: [BorderCatalog]
      operationId: listBorderCharges
      summary: List border charge catalog entries
      parameters:
        - name: borderPost
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BorderCharge'
    post:
      tags: [BorderCatalog]
      operationId: createBorderCharge
      summary: Add a border charge catalog entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BorderChargeInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BorderCharge'

  /border-catalog/{chargeId}:
    patch:
      tags: [BorderCatalog]
      operationId: updateBorderCharge
      summary: Update a border charge
      parameters:
        - name: chargeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BorderChargeUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BorderCharge'
    delete:
      tags: [BorderCatalog]
      operationId: deleteBorderCharge
      summary: Delete a border charge entry
      parameters:
        - name: chargeId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted

  # ─── Object Storage ────────────────────────────────────────────────────────
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an uploaded object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content

  # ─── Dashboard KPIs ────────────────────────────────────────────────────────
  /dashboard/kpis:
    get:
      tags: [Dashboard]
      operationId: getDashboardKpis
      summary: Get command-centre KPIs and exceptions
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardKpis'

  /dashboard/fleet-map:
    get:
      tags: [Dashboard]
      operationId: getFleetMap
      summary: Get fleet map data (trucks with last reported position)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
